<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - GP Crackers</title>
  <link rel="icon" type="image/png" href="assets/images/gp_fav.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/home.css">
  <link rel="stylesheet" href="assets/css/cart.css">
</head>

<body>

  <!-- Navbar Component -->
  <script src="components/navbar.js"></script>

  <!-- ============================
       Cart Hero Section
       ============================ -->
  <section class="cart-hero">
    <div class="container">
      <h1 class="cart-title">Your Shopping Cart</h1>
      <p class="cart-subtitle">Review your items before checkout</p>
    </div>
  </section>

  <!-- ============================
       Cart Content Section
       ============================ -->
  <section class="cart-section">
    <div class="container">
      <div class="row g-4" id="cart-container">
        
        <!-- Cart Items List -->
        <div class="col-lg-8" id="cart-items-container">
          <div class="cart-table-wrapper">
            <div class="table-responsive">
              <table class="table table-cart table-hover align-middle">
                <thead>
                  <tr>
                    <th scope="col" style="width: 50%;">Product</th>
                    <th scope="col" class="text-center" style="width: 15%;">Price</th>
                    <th scope="col" class="text-center" style="width: 20%;">Quantity</th>
                    <th scope="col" class="text-center" style="width: 10%;">Total</th>
                    <th scope="col" class="text-center" style="width: 5%;"></th>
                  </tr>
                </thead>
                <tbody id="cart-tbody">
                  <!-- Javascript will inject cart items here -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Cart Summary Box -->
        <div class="col-lg-4" id="cart-summary-container" style="display: none;">
          <div class="cart-summary">
            <h4>Order Summary</h4>
            <div class="summary-row">
              <span>Subtotal (<span id="summary-items-count">0</span> items)</span>
              <span class="fw-bold">₹<span id="summary-subtotal">0</span></span>
            </div>
            <div class="summary-row">
              <span>Shipping Estimate</span>
              <span class="fw-bold text-success">Free</span>
            </div>
            <div class="summary-total">
              <span>Total Amount</span>
              <span>₹<span id="summary-total">0</span></span>
            </div>
            
            <button class="btn btn-checkout">
              Proceed to Checkout <i class="bi bi-arrow-right-short ms-1"></i>
            </button>
            <div class="text-center mt-3">
              <a href="products.html" class="text-muted text-decoration-none" style="font-size: 0.9rem;">
                <i class="bi bi-arrow-left-short"></i> Continue Shopping
              </a>
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </section>

  <!-- Footer Component -->
  <script src="components/footer.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Main Custom JS -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/cart.js"></script>

  <!-- Render Scripts specifically for Cart.html -->
  <script>
    function renderCartPage() {
      const cart = getCart();
      const tbody = document.getElementById('cart-tbody');
      const cartContainer = document.getElementById('cart-container');
      const cartItemsContainer = document.getElementById('cart-items-container');
      const summaryContainer = document.getElementById('cart-summary-container');
      
      tbody.innerHTML = '';

      if (cart.length === 0) {
        // Show empty cart message
        cartItemsContainer.className = 'col-12';
        summaryContainer.style.display = 'none';
        
        tbody.innerHTML = `
          <tr>
            <td colspan="5">
              <div class="empty-cart-msg">
                <i class="bi bi-cart-x empty-cart-icon"></i>
                <h3 class="fw-bold text-dark mt-3">Your cart is empty</h3>
                <p class="text-muted mb-4">Looks like you haven't added any crackers to your cart yet.</p>
                <a href="products.html" class="btn btn-primary btn-lg rounded-pill px-4" style="background:#0C2D5E;border:none;">
                  Start Shopping
                </a>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      // Restore grid layout if items exist
      cartItemsContainer.className = 'col-lg-8';
      summaryContainer.style.display = 'block';

      // Inject row HTML
      cart.forEach(item => {
        const tr = document.createElement('tr');
        const itemTotal = item.price * item.quantity;

        tr.innerHTML = `
          <td>
            <div class="d-flex align-items-center">
              <img src="${item.image}" alt="${item.name}" class="cart-item-img me-3">
              <div>
                <div class="cart-item-name">${item.name}</div>
                <small class="text-muted text-uppercase" style="font-size: 0.75rem;">Premium Cracker</small>
              </div>
            </div>
          </td>
          <td class="text-center cart-item-price">
            ₹${item.price}
          </td>
          <td>
            <div class="input-group input-group-sm qty-input-group">
              <button class="btn btn-outline-secondary" type="button" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">-</button>
              <input type="text" class="form-control text-center" value="${item.quantity}" readonly>
              <button class="btn btn-outline-secondary" type="button" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
            </div>
          </td>
          <td class="text-center cart-item-total">
            ₹${itemTotal}
          </td>
          <td class="text-center">
            <button class="btn-remove" onclick="removeFromCart('${item.id}')" title="Remove item">
              <i class="bi bi-trash3-fill"></i>
            </button>
          </td>
        `;

        tbody.appendChild(tr);
      });

      // Update Summary logic
      document.getElementById('summary-items-count').textContent = getCartItemCount();
      
      const totalPrice = getCartTotal();
      document.getElementById('summary-subtotal').textContent = totalPrice;
      document.getElementById('summary-total').textContent = totalPrice;
    }

    // Initialize Page Render
    document.addEventListener('DOMContentLoaded', renderCartPage);
  </script>
</body>

</html>
